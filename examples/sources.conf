# Shokz Sync - Music Sources
# Format: type|url|label
# Supported types: soundcloud, youtube, mixcloud, podcast
#
# To add sources, use: shokz-sync add <type> <url> <label>
# To import podcasts: shokz-sync import-opml ~/path/to/podcasts.opml

# SoundCloud - likes, playlists, or artist pages
#soundcloud|https://soundcloud.com/USERNAME/likes|SoundCloud Likes

# YouTube - playlists or channels
#youtube|https://www.youtube.com/playlist?list=PLAYLIST_ID|YouTube Music

# Mixcloud - favorites or user pages
#mixcloud|https://www.mixcloud.com/USERNAME/favorites/|Mixcloud Favorites

# Podcasts - RSS feed URLs
#podcast|https://feeds.example.com/feed.xml|Example Podcast
